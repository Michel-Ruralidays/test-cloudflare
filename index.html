<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloudflare Test Page</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="hero">
    <p class="eyebrow">GitHub to Cloudflare</p>
    <h1>Deployment test page</h1>
    <p class="intro">
      This static page now includes a tiny Worker endpoint so the project can use runtime variables and secrets safely.
    </p>
    <div class="status-card">
      <p class="label">Target repository</p>
      <p class="value">Michel-Ruralidays/test-cloudflare</p>
      <p class="label">Page type</p>
      <p class="value">Static assets + Worker</p>
      <p class="label">Runtime env check</p>
      <p class="value" id="env-status">Checking /api/env-check...</p>
    </div>
  </main>
  <script>
    async function loadEnvStatus() {
      const output = document.getElementById("env-status");

      try {
        const response = await fetch("/api/env-check");
        const data = await response.json();
        output.textContent =
          "DEMO_VALUE=" +
          (data.demoValue ?? "not set") +
          " | FEATURE_FLAG_A=" +
          (data.featureFlagA ?? "not set") +
          " | DEMO_SECRET configured=" +
          (data.secretConfigured ? "yes" : "no");
      } catch (error) {
        output.textContent = "Env check unavailable";
      }
    }

    loadEnvStatus();
  </script>
</body>
</html>
